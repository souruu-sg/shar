<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Shar ❤️</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">

    <style>
        /* Reset & Layout Fixes */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19;
            -webkit-font-smoothing: antialiased;
        }

        /* 1. Dynamic Backgrounds */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: filter 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: -1;
        }

        /* Soft vignette overlay for cinematic depth */
        .background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.4) 100%);
        }

        @media (min-width: 769px) {
            .background { background-image: url('assets/bg-desktop.JPG'); }
        }

        @media (max-width: 768px) {
            .background { background-image: url('assets/bg-mobile.JPG'); }
        }

        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 24px;
            position: relative;
        }

        /* 2. Minimalistic Envelope Styling */
        .envelope-container {
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
        }

        .envelope-container:hover {
            transform: scale(1.05);
        }

        .envelope {
            width: 120px;
            height: 80px;
            background: #ffffff;
            border-radius: 4px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Minimalistic Flat Flap */
        .envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            border-top: 42px solid #f1f5f9;
            border-radius: 4px 4px 0 0;
        }

        /* Classy Heart Indicator */
        .heart {
            width: 22px;
            height: 22px;
            background-color: #e11d48;
            position: absolute;
            top: 45%;
            transform: rotate(-45deg);
            animation: elegantPulse 2s infinite ease-in-out;
            z-index: 2;
        }

        .heart::before, .heart::after {
            content: "";
            background-color: #e11d48;
            border-radius: 50%;
            position: absolute;
            width: 22px;
            height: 22px;
        }

        .heart::before { top: -11px; left: 0; }
        .heart::after { left: 11px; top: 0; }

        @keyframes elegantPulse {
            0% { transform: scale(0.95) rotate(-45deg); opacity: 0.9; }
            50% { transform: scale(1.08) rotate(-45deg); opacity: 1; }
            100% { transform: scale(0.95) rotate(-45deg); opacity: 0.9; }
        }

        /* 3. Classy Frosted Sky-Blue Dialogue Box */
        .dialogue-box {
            position: absolute;
            width: 460px;
            min-height: 280px;
            /* Ultra-premium glassmorphism with a soft sky blue tint */
            background: rgba(240, 249, 255, 0.75); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255,255,255,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            pointer-events: none;
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (max-width: 480px) {
            .dialogue-box {
                width: 92%;
                padding: 32px 24px;
            }
        }

        /* Typography Styles */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #0f172a;
            letter-spacing: -0.5px;
        }

        p {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            line-height: 1.65;
            font-weight: 400;
            color: #334155;
            letter-spacing: -0.1px;
        }

        /* Animation States */
        .hidden {
            opacity: 0 !important;
            transform: scale(0.9) !important;
            pointer-events: none !important;
        }

        .show-box {
            opacity: 1 !important;
            transform: translateY(0) scale(1) !important;
            pointer-events: auto !important;
        }
    </style>
</head>
<body>

    <div class="background" id="bg"></div>

    <div class="wrapper">
        
        <div class="envelope-container" id="envelopeContainer" onclick="openLetter()">
            <div class="envelope">
                <div class="heart"></div>
            </div>
        </div>

        <div class="dialogue-box" id="dialogueBox">
            <h1>Hi Sharr ❤️</h1>
            <p id="messageText">Loading message...</p>
        </div>

    </div>

    <script>
        // =======================================================
        // ====== 🖋️ EDIT YOUR DAILY MESSAGE INSIDE HERE 🖋️ ======
        // =======================================================
        
        const dailyMessage = "As a fellow software engineer this one of the smallest gestures I can show you. This is just the beginning of us and I wanna make this one count. I LOVE YOU SHAR ";
        
        // =======================================================
        // =======================================================

        document.getElementById('messageText').textContent = dailyMessage;

        function openLetter() {
            const envelope = document.getElementById('envelopeContainer');
            const box = document.getElementById('dialogueBox');
            const bg = document.getElementById('bg');

            envelope.classList.add('hidden');
            
            // Premium background softening
            bg.style.filter = "blur(6px) brightness(0.9)";

            setTimeout(() => {
                envelope.style.display = 'none';
                box.classList.add('show-box');
            }, 300);
        }
    </script>
</body>
</html>
